<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>벤치마크 점수 확인</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="container">
    <h1>CPP CLI Benchmark Report</h1>
    <p class="hint">결과 파일: <code>result.json</code></p>

    <section class="card">
      <h2>시스템 정보</h2>
      <dl id="system"></dl>
    </section>

    <section class="card">
      <h2>측정 시간(ms)</h2>
      <table>
        <thead><tr><th>항목</th><th>시간(ms)</th></tr></thead>
        <tbody id="times"></tbody>
      </table>
    </section>

    <section class="card">
      <h2>기본 이상치 검사</h2>
      <ul id="checks"></ul>
    </section>
  </main>
  <script src="./report.js"></script>
</body>
</html>
